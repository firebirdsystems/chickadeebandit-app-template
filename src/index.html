<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Template</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: var(--hub-bg, #f9fafb);
      --surface: var(--hub-surface, #ffffff);
      --border: var(--hub-border, #e5e7eb);
      --border-mid: var(--hub-border, #d1d5db);
      --text: var(--hub-text, #000000);
      --muted: var(--hub-text-muted, #6b7280);
      --accent: var(--hub-primary, #111827);
      --accent-hover: var(--hub-primary-hover, #374151);
      --accent-fg: var(--hub-primary-fg, #ffffff);
      --radius: var(--hub-radius, 8px);
      --red: #b91c1c;
      --red-soft: #fee2e2;
      --shadow: 0 1px 3px rgba(15, 23, 42, .07);
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: var(--hub-font-size, 15px);
      line-height: 1.5;
    }
    .app { max-width: 640px; margin: 0 auto; padding: 16px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    h1 { font-size: 1.35rem; line-height: 1.2; }
    .muted { color: var(--muted); }
    .tiny { font-size: .78rem; }
    .stack { display: grid; gap: 10px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .item-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .item-title { font-weight: 700; }
    .item-meta { margin-top: 2px; color: var(--muted); font-size: .8rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border: 1px solid transparent; border-radius: 8px; padding: 8px 12px;
      font: inherit; font-size: .86rem; font-weight: 700; cursor: pointer;
      min-height: 38px; background: var(--accent); color: var(--accent-fg);
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: .48; cursor: default; }
    .btn-sm { min-height: 30px; padding: 4px 8px; font-size: .78rem; }
    .btn-quiet-danger {
      min-height: 28px; padding: 3px 8px; background: transparent; color: var(--muted);
      border: 0; font-size: .76rem; font-weight: 700;
    }
    .btn-quiet-danger:hover { background: var(--red-soft); color: var(--red); }
    .form { display: grid; gap: 10px; margin-bottom: 14px; }
    .field { display: grid; gap: 4px; }
    label { font-size: .76rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 800; }
    input, textarea {
      width: 100%; border: 1.5px solid var(--border-mid); border-radius: 8px;
      padding: 9px 11px; font: inherit; background: var(--surface); color: var(--text);
    }
    /* Canonical in-app search row — see "Adding search to an app" in CLAUDE.md. */
    .search-row { margin-bottom: 12px; }
    .search-input { width: 100%; border: 1.5px solid var(--border-mid); border-radius: 8px; padding: 9px 11px; font: inherit; background: var(--surface); color: var(--text); }
    .search-input:focus { outline: none; border-color: var(--accent); }
    textarea { min-height: 60px; resize: vertical; }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    .empty, .loading { color: var(--muted); text-align: center; padding: 28px 16px; }
    .error { background: var(--red-soft); color: var(--red); padding: 9px 12px; border-radius: 8px; margin-bottom: 10px; font-size: .86rem; }
  </style>
  <base href="/run/app-template/">
</head>
<body>
<div class="app">
  <div id="root" class="loading">Loading…</div>
</div>

<script type="module">
import { esc, isAdult, searchMatch } from "/hub-sdk.js";

// --- Hub runtime globals (empty in demo mode) --------------------------------
const CONTEXT = window.__CONTEXT_URL ?? "";
const DB = window.__DB_URL ?? "";
const HUB_MEMBER = window.__CURRENT_MEMBER ?? null;

// --- App state ---------------------------------------------------------------
let members = [];
let currentMember = null;
let items = [];
let error = "";
let searchQ = "";

function nowIso() { return new Date().toISOString(); }
function memberName(id) { return members.find(m => m.id === id)?.name ?? "Someone"; }

// The fields in-app search matches against. Keep it to the text a user would
// type to find an item — for real apps, move this into src/logic.js and unit
// test it (see "Adding search to an app" in CLAUDE.md).
function searchableFields(item) { return [item.title, item.note]; }

// The `items` policy is adult_writable, so only adults may create/edit/delete.
// Mirror that in the UI exactly — a cosmetic gate that disagrees with the hub
// just shows buttons that 403 on click.
function canManage() { return isAdult(currentMember); }

async function db(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

async function loadMembers() {
  if (!CONTEXT) {
    members = [
      { id: "demo-1", name: "Alex", role: "adult" },
      { id: "demo-2", name: "Jordan", role: "adult" },
      { id: "demo-3", name: "Casey", role: "child" },
    ];
  } else {
    const res = await fetch(`${CONTEXT}?keys=family.members`);
    members = ((await res.json())["family.members"]) ?? [];
  }
  currentMember = HUB_MEMBER ?? members[0] ?? { id: "guest", name: "Guest", role: "adult" };
}

async function loadItems() {
  if (!DB) {
    // Demo-mode fallback so the app renders with no hub attached.
    items = [
      { id: "demo-a", title: "First item", note: "This is example data shown in demo mode.", created_by: "demo-1", created_at: nowIso() },
    ];
    return;
  }
  const { rows } = await db("SELECT * FROM app_app_template__items ORDER BY created_at DESC");
  items = rows;
}

async function refresh() {
  error = "";
  try {
    await Promise.all([loadMembers(), loadItems()]);
    render();
  } catch (e) {
    error = e.message;
    render();
  }
}

async function createItem(form) {
  if (!canManage()) { error = "Only adults can add items."; return render(); }
  const title = form.title.value.trim();
  const note = form.note.value.trim();
  if (!title) { form.title.focus(); return; }

  const item = { id: crypto.randomUUID(), title, note, created_by: currentMember.id, created_at: nowIso() };
  try {
    await db(
      "INSERT INTO app_app_template__items (id, title, note, created_by, created_at) VALUES (?, ?, ?, ?, ?)",
      [item.id, item.title, item.note, item.created_by, item.created_at]
    );
    // Optimistic update — patch local state, don't reload the whole list.
    items = [item, ...items];
    form.reset();
    error = "";
    render();
  } catch (e) {
    error = e.message;
    render();
  }
}

async function deleteItem(id) {
  if (!canManage()) { error = "Only adults can delete items."; return render(); }
  try {
    await db("DELETE FROM app_app_template__items WHERE id = ?", [id]);
    items = items.filter(i => i.id !== id);
    render();
  } catch (e) {
    error = e.message;
    render();
  }
}

function renderItem(item) {
  return `
    <article class="card">
      <div class="item-head">
        <div>
          <div class="item-title">${esc(item.title)}</div>
          ${item.note ? `<div class="item-meta">${esc(item.note)}</div>` : ""}
          <div class="item-meta tiny">Added by ${esc(memberName(item.created_by))}</div>
        </div>
        ${canManage() ? `<button class="btn btn-quiet-danger" data-delete="${esc(item.id)}">Delete</button>` : ""}
      </div>
    </article>
  `;
}

function render() {
  const root = document.getElementById("root");
  root.className = "app";
  root.innerHTML = `
    <div class="topbar">
      <div>
        <h1>App Template</h1>
        <p class="muted tiny">A minimal starting point — replace this with your app.</p>
      </div>
      <button class="btn btn-ghost btn-sm" type="button" data-refresh>Refresh</button>
    </div>
    ${error ? `<div class="error">${esc(error)}</div>` : ""}
    ${canManage() ? `
      <form class="card form" id="create-form">
        <div class="field">
          <label for="title">Title</label>
          <input id="title" name="title" placeholder="Something to track" required />
        </div>
        <div class="field">
          <label for="note">Note</label>
          <textarea id="note" name="note" placeholder="Optional details"></textarea>
        </div>
        <button class="btn" type="submit">Add item</button>
      </form>
    ` : `<p class="muted tiny" style="margin-bottom:14px">Only adults can add items.</p>`}
    ${items.length ? `
      <div class="search-row">
        <input id="search" class="search-input" type="search" placeholder="Search…" aria-label="Search" value="${esc(searchQ)}" />
      </div>` : ""}
    <section class="stack" id="list">
      ${renderList()}
    </section>
  `;
}

function renderList() {
  if (!items.length) return `<div class="card empty">No items yet.</div>`;
  const list = searchQ ? items.filter(i => searchMatch(searchQ, searchableFields(i))) : items;
  if (!list.length) return `<div class="card empty">No items match "${esc(searchQ)}".</div>`;
  return list.map(renderItem).join("");
}

document.addEventListener("click", (event) => {
  const target = event.target.closest("button");
  if (!target) return;
  if (target.matches("[data-refresh]")) { refresh(); return; }
  if (target.hasAttribute("data-delete")) { deleteItem(target.getAttribute("data-delete")); return; }
});

document.addEventListener("submit", (event) => {
  if (event.target.id !== "create-form") return;
  event.preventDefault();
  createItem(event.target);
});

// Re-render only the list on each keystroke so the search box keeps focus.
document.addEventListener("input", (event) => {
  if (event.target.id !== "search") return;
  searchQ = event.target.value;
  const list = document.getElementById("list");
  if (list) list.innerHTML = renderList();
});

refresh();
</script>
</body>
</html>
